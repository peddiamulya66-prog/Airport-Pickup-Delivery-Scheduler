<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Airport Pickup & Delivery Scheduler</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard-customer.css">
</head>
<body>
    <div class="container">
        <!-- Header with User Info -->
        <header class="header">
            <div class="header-content">
                <h1>✈️ Airport Pickup & Delivery Scheduler</h1>
                <p class="company">ORBEM Solutions Private Limited</p>
            </div>
            <div class="user-info">
                <span id="userName" class="user-name">Customer</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="nav">
            <button class="nav-btn active" data-tab="dashboard">My Shipments</button>
            <button class="nav-btn" data-tab="new-request">New Shipment</button>
            <button class="nav-btn" data-tab="tracking">Tracking</button>
        </nav>

        <!-- Dashboard Tab -->
        <section id="dashboard-tab" class="tab-content active">
            <div class="dashboard-container">
                <h2>My Shipments</h2>
                
                <div class="customer-stats">
                    <div class="stat-card">
                        <h3>Total Shipments</h3>
                        <p class="stat-number" id="totalShipments">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>In Transit</h3>
                        <p class="stat-number" id="inTransitShipments">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Delivered</h3>
                        <p class="stat-number" id="deliveredShipments">0</p>
                    </div>
                </div>

                <div class="table-container">
                    <table id="shipmentsTable" class="shipments-table">
                        <thead>
                            <tr>
                                <th>Shipment ID</th>
                                <th>Destination</th>
                                <th>Status</th>
                                <th>Delivery Partner</th>
                                <th>Sent On</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <tr>
                                <td colspan="5" class="empty-state">No shipments yet. Create one to get started!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- New Request Tab -->
        <section id="new-request-tab" class="tab-content">
            <div class="form-container">
                <h2>Create New Shipment</h2>
                <form id="shipmentForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="pickupCity">Pickup City *</label>
                            <input type="text" id="pickupCity" name="pickupCity" required placeholder="Enter pickup city">
                        </div>
                        <div class="form-group">
                            <label for="destination">Destination *</label>
                            <input type="text" id="destination" name="destination" required placeholder="City/Airport">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cargoType">Cargo Type *</label>
                            <select id="cargoType" name="cargoType" required>
                                <option value="">Select cargo type</option>
                                <option value="documents">Documents</option>
                                <option value="samples">Samples</option>
                                <option value="parts">Parts</option>
                                <option value="perishables">Perishables</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="weight">Weight (kg) *</label>
                            <input type="number" id="weight" name="weight" required step="0.01" placeholder="0.00">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="quantity">Quantity *</label>
                            <input type="number" id="quantity" name="quantity" required min="1" placeholder="1">
                        </div>
                        <div class="form-group">
                            <label for="deliveryAddress">Delivery Address</label>
                            <input type="text" id="deliveryAddress" name="deliveryAddress" placeholder="Optional delivery address">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" name="description" placeholder="Describe your shipment..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Create Shipment</button>
                    <div id="formStatus" class="status-message"></div>
                </form>
            </div>
        </section>

        <!-- Tracking Tab -->
        <section id="tracking-tab" class="tab-content">
            <div class="tracking-container">
                <h2>Track Your Shipment</h2>
                <div class="tracking-search">
                    <input type="text" id="trackingId" placeholder="Enter Shipment ID" />
                    <button onclick="trackShipment()" class="btn btn-primary">Track</button>
                </div>
                <div id="trackingResult" class="tracking-result"></div>
            </div>
        </section>
    </div>

    <script src="dashboard-customer.js"></script>
</body>
</html>
